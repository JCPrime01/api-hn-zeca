<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>comunidadezeca-hn 03 – grupogratuito.website</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #1491E6;
            --bg-black: #000000;
            --text-white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Sora', sans-serif;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px 10px;
        }

        .main-container {
            width: 100%;
            max-width: 400px;
            border: 1px solid #1491E6;
            border-radius: 15px;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(20,145,230,0.05) 100%);
            margin-top: 20px;
        }

        .profile-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        /* Brilho verde atrás da imagem */
        .profile-wrapper::before {
            content: '';
            position: absolute;
            width: 150px;
            height: 150px;
            background: #00FF00;
            filter: blur(60px);
            border-radius: 50%;
            z-index: 0;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.6;
        }

        .profile-img {
            width: 280px;
            height: auto;
            position: relative;
            z-index: 1;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .headline {
            font-size: 28px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 15px;
        }

        .subheadline {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 25px;
            color: #FFFFFF;
        }

        .subheadline span {
            color: var(--primary-blue);
        }

        .cta-button {
            background-color: var(--primary-blue);
            color: #000000;
            text-decoration: none;
            font-weight: 800;
            font-size: 18px;
            padding: 18px 0;
            border-radius: 8px;
            width: 100%;
            display: block;
            margin-bottom: 30px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
            box-shadow: 0 0 15px rgba(20, 145, 230, 0.4);
        }

        @keyframes pulse {
            0% { transform: scale(0.95); }
            70% { transform: scale(1.05); }
            100% { transform: scale(0.95); }
        }

        .disclaimer-img {
            width: 250px;
            height: auto;
            margin-bottom: 10px;
        }

        .copyright {
            font-size: 12px;
            color: #888;
            margin-top: 40px;
            font-weight: 400;
        }

        @media (max-width: 360px) {
            .headline { font-size: 24px; }
            .profile-img { width: 240px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="profile-wrapper">
            <!-- Imagem real do Zeca extraída do link -->
            <img src="https://grupogratuito.website/wp-content/uploads/2026/03/1-1024x1024.png" alt="Zeca" class="profile-img">
        </div>

        <h1 class="headline">Bilhete Liberado <br> no Whatsapp</h1>
        
        <p class="subheadline">Clique no botão e fale comigo no <span>WhatsApp</span> ! 👇🏻</p>

        <a href="https://mais.red/run/zecaorganico" class="cta-button">PEGAR BILHETE</a>

        <!-- Imagem de responsabilidade extraída do link -->
        <img src="https://grupogratuito.website/wp-content/uploads/2025/01/JOGUE-COM-RESPONSABILIDADE-300x42-1.webp" alt="Jogue com responsabilidade" class="disclaimer-img">
    </div>

    <p class="copyright">Copyright © 2025 – Todos os direitos reservados</p>

</body>
</html>
